<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none" role="img" aria-label="Barman Copilot servant de l'information">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0078d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b9eff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#3b1a78"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- warm pub glow -->
  <circle cx="430" cy="150" r="200" fill="url(#glow)"/>

  <!-- back shelf -->
  <rect x="300" y="70" width="330" height="10" rx="5" fill="#8b5cf6" opacity="0.35"/>
  <g opacity="0.85">
    <rect x="330" y="30" width="20" height="42" rx="6" fill="url(#brand)"/>
    <rect x="336" y="20" width="8" height="14" rx="3" fill="#3b9eff"/>
    <rect x="372" y="24" width="22" height="48" rx="6" fill="url(#brand)"/>
    <rect x="379" y="14" width="8" height="14" rx="3" fill="#a78bfa"/>
    <rect x="416" y="34" width="18" height="38" rx="6" fill="url(#brand)"/>
    <rect x="421" y="24" width="8" height="12" rx="3" fill="#3b9eff"/>
  </g>

  <!-- floating information served as drinks -->
  <g opacity="0.9">
    <path d="M470 40c14 0 26 10 26 23 0 12-12 22-26 22-3 0-6 0-9-1l-13 6 4-12c-6-4-9-10-9-15 0-13 12-23 27-23z" fill="url(#brand)"/>
    <circle cx="461" cy="63" r="2.6" fill="#fff"/>
    <circle cx="470" cy="63" r="2.6" fill="#fff"/>
    <circle cx="479" cy="63" r="2.6" fill="#fff"/>
  </g>
  <g fill="#ffd36e">
    <path d="M545 96l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
    <path d="M330 120l2 6 6 2-6 2-2 6-2-6-6-2 6-2z"/>
    <path d="M566 150l2 6 6 2-6 2-2 6-2-6-6-2 6-2z"/>
  </g>

  <!-- bar counter -->
  <rect x="250" y="300" width="390" height="70" rx="10" fill="url(#counter)"/>
  <rect x="250" y="300" width="390" height="12" rx="6" fill="#8b5cf6"/>

  <!-- cocktail glasses on the counter, "information" fizzing up -->
  <g>
    <!-- martini glass -->
    <path d="M300 250l34 0-17 22z" fill="url(#glass)"/>
    <rect x="315" y="272" width="4" height="24" fill="#8b5cf6"/>
    <rect x="304" y="296" width="26" height="5" rx="2.5" fill="#8b5cf6"/>
    <circle cx="317" cy="243" r="4" fill="#ffd36e"/>
    <circle cx="308" cy="236" r="3" fill="#3b9eff"/>
    <circle cx="326" cy="234" r="2.5" fill="#a78bfa"/>

    <!-- pint of data -->
    <path d="M356 250h34l-4 46h-26z" fill="url(#glass)"/>
    <text x="373" y="284" font-family="monospace" font-size="13" fill="#fff" text-anchor="middle" opacity="0.9">01</text>
    <circle cx="366" cy="240" r="3" fill="#ffd36e"/>
    <circle cx="380" cy="236" r="2.5" fill="#3b9eff"/>
  </g>

  <!-- barman -->
  <g>
    <!-- raised arm holding a glass -->
    <path d="M250 250c-14-6-24-18-24-34" stroke="url(#brand)" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M214 205l24 0-12 18z" fill="url(#glass)"/>
    <circle cx="226" cy="200" r="3" fill="#ffd36e"/>
    <circle cx="219" cy="194" r="2.2" fill="#3b9eff"/>
    <circle cx="233" cy="193" r="2" fill="#a78bfa"/>

    <!-- body / vest -->
    <path d="M188 300c0-40 18-70 44-70s44 30 44 70z" fill="url(#brand)"/>
    <path d="M232 234c14 2 26 16 32 40l-32 8-30-8c5-24 16-38 30-40z" fill="#2a2140"/>
    <!-- bowtie -->
    <path d="M222 238l10 7-10 7z" fill="#ffd36e"/>
    <path d="M242 238l-10 7 10 7z" fill="#ffd36e"/>
    <circle cx="232" cy="245" r="2.5" fill="#6d28d9"/>
    <!-- head -->
    <circle cx="232" cy="205" r="26" fill="#f2c9a0"/>
    <!-- hair -->
    <path d="M206 200c0-18 12-30 26-30s26 12 26 28c-6-8-16-12-26-12-8 3-12 6-14 12-4-2-8-1-12 2z" fill="#3a2a1a"/>
    <!-- eyes -->
    <circle cx="224" cy="203" r="2.6" fill="#2a2140"/>
    <circle cx="242" cy="203" r="2.6" fill="#2a2140"/>
    <!-- mustache -->
    <path d="M224 216c3 3 12 3 16 0-2 4-6 6-8 6s-6-2-8-6z" fill="#3a2a1a"/>
    <!-- smile -->
    <path d="M226 214c4 3 8 3 12 0" stroke="#a8683f" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
</svg>
